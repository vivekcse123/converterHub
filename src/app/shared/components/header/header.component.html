<header class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 shadow-sm">
  <div class="container-app">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2.5 group" (click)="closeMobile()">
        <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center shadow-md group-hover:shadow-glow transition-shadow duration-200">
          <span class="text-white text-lg">⚡</span>
        </div>
        <span class="font-bold text-xl text-slate-900 dark:text-white tracking-tight">
          Converter<span class="text-primary-600">Hub</span>
        </span>
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex items-center gap-1">
        <a routerLink="/"           routerLinkActive="bg-primary-50 dark:bg-primary-950 text-primary-600" [routerLinkActiveOptions]="{exact:true}"
           class="px-3.5 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          Tools
        </a>
        <a routerLink="/pdf-editor" routerLinkActive="bg-primary-50 dark:bg-primary-950 text-primary-600"
           class="px-3.5 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          PDF Editor
        </a>
        <a routerLink="/image-editor" routerLinkActive="bg-primary-50 dark:bg-primary-950 text-primary-600"
           class="px-3.5 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          Image Editor
        </a>
      </nav>

      <!-- Right Actions -->
      <div class="flex items-center gap-2">

        <!-- Dark Mode Toggle -->
        <button (click)="theme.toggle()" aria-label="Toggle dark mode"
          class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-300">
          <svg *ngIf="!theme.isDark()" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
          <svg *ngIf="theme.isDark()" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </button>

        <!-- Auth Buttons -->
        <ng-container *ngIf="!auth.isLoggedIn(); else userMenu">
          <a routerLink="/login" class="hidden md:inline-flex btn btn-secondary btn-sm">Login</a>
          <a routerLink="/register" class="btn btn-primary btn-sm">Sign up free</a>
        </ng-container>

        <ng-template #userMenu>
          <a routerLink="/dashboard" class="hidden md:inline-flex btn btn-secondary btn-sm gap-2">
            <span class="w-5 h-5 bg-primary-600 rounded-full text-white text-xs flex items-center justify-center font-semibold">
              {{ auth.user()?.name?.charAt(0)?.toUpperCase() }}
            </span>
            {{ auth.user()?.name }}
          </a>
          <button (click)="auth.logout()" class="hidden md:inline-flex btn btn-secondary btn-sm text-red-500">
            Logout
          </button>
        </ng-template>

        <!-- Mobile hamburger -->
        <button (click)="toggleMobile()" class="md:hidden p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          aria-label="Open menu">
          <svg class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path *ngIf="!mobileOpen()" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            <path *ngIf="mobileOpen()"  stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- Mobile Nav -->
    <div *ngIf="mobileOpen()" class="md:hidden pb-4 animate-slide-down border-t border-slate-100 dark:border-slate-800 mt-1">
      <nav class="flex flex-col gap-1 pt-2">
        <a routerLink="/"             (click)="closeMobile()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">Tools</a>
        <a routerLink="/pdf-editor"   (click)="closeMobile()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">PDF Editor</a>
        <a routerLink="/image-editor" (click)="closeMobile()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">Image Editor</a>
        <hr class="my-1 border-slate-200 dark:border-slate-700">
        <ng-container *ngIf="!auth.isLoggedIn(); else mobileUser">
          <a routerLink="/login"    (click)="closeMobile()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">Login</a>
          <a routerLink="/register" (click)="closeMobile()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-950">Sign up free</a>
        </ng-container>
        <ng-template #mobileUser>
          <a routerLink="/dashboard" (click)="closeMobile()" class="px-4 py-2.5 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">Dashboard</a>
          <button (click)="auth.logout(); closeMobile()" class="text-left px-4 py-2.5 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20">Logout</button>
        </ng-template>
      </nav>
    </div>
  </div>
</header>
